<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      html.lenis, html.lenis body {
        height: auto;
      }
      .lenis.lenis-smooth {
        scroll-behavior: auto !important;
      }
      .lenis.lenis-smooth [data-lenis-prevent] {
        overscroll-behavior: contain;
      }
      .lenis.lenis-stopped {
        overflow: hidden;
      }
      .lenis.lenis-scrolling iframe {
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="page1" class="w-full h-screen bg-[#D1D1D1] flex items-center justify-center">
          <div class="car w-full h-1/3 bg-[#1E1E1E] relative z-10">
              <img src="car.png" class="w-2/3 sm:w-1/2 md:w-1/3 absolute top-1/2 left-1/6 transform -translate-x-1/2 -translate-y-1/2" alt="">
          </div>
          <div class="absolute bg-[#45DB7D] w-full h-1/3 flex items-center justify-center">
            <div class="content">
            <h1 class="text-[9vw] tracking-wider font-bold text-black  uppercase ">welcome itzfizz</h1>
            </div>
          </div>

          <div  class=" box1 w-[42vw] h-[22vw] md:w-[20vw] md:h-[10vw] bg-[#DEF54F] top-[2vh] md:top-[4.5vh] rounded-lg right-[4%] md:right-[34%] absolute p-[2.5vw] md:p-[1vw]">
            <div class="flex items-center justify-center w-full h-full  flex-col gap-1 md:gap-2">
              <div class="div w-full flex items-center justify-end">
                 <h1 class="text-[clamp(1.2rem,3.2vw,3rem)] font-bold text-end">58%</h1>
              </div>
              <p class="text-[clamp(0.65rem,2.5vw,1.125rem)] md:text-[clamp(0.65rem,1.2vw,1.125rem)]">Increase in pick up point use</p>
            </div>
          </div>
          
          <div class=" box2 w-[42vw] h-[22vw] md:w-[20vw] md:h-[10vw] bg-[#6AC9FF] bottom-[2vh] md:bottom-[4vh] rounded-lg right-[52%] md:right-[42%] absolute p-[2.5vw] md:p-[1vw]">
            <div class="flex items-center justify-center w-full h-full flex-col gap-1 md:gap-2 p-[1vw] md:p-[0.5vw]">
              <div class="div w-full flex items-center justify-end">
                 <h1 class="text-[clamp(1.2rem,3.2vw,3rem)] font-bold text-end">23%</h1>
              </div>
              <p class="text-[clamp(0.55rem,2.2vw,0.875rem)] md:text-[clamp(0.55rem,0.9vw,0.875rem)]">Decreased in customer phone calls</p>
            </div>
          </div>

          <div class="box3 w-[42vw] h-[22vw] md:w-[20vw] md:h-[10vw] bg-[#333333] top-[2vh] md:top-[4.5vh] rounded-lg right-[52%] md:right-[12%] absolute p-[2.5vw] md:p-[1vw]">
            <div class="flex items-center justify-center w-full h-full flex-col gap-1 md:gap-2">
              <div class="div w-full flex items-center justify-end">
                 <h1 class="text-[clamp(1.2rem,3.2vw,3rem)] text-white font-bold text-end">58%</h1>
              </div>
              <p class="text-[clamp(0.65rem,2.5vw,1.125rem)] md:text-[clamp(0.65rem,1.2vw,1.125rem)] text-white">Increase in pick up point use</p>
            </div>
          </div>

          <div class="box4 w-[42vw] h-[22vw] md:w-[20vw] md:h-[10vw] bg-[#FA7328] bottom-[2vh] md:bottom-[4vh] rounded-lg right-[4%] md:right-[20%] absolute p-[2.5vw] md:p-[1vw]">
            <div class="flex items-center justify-center w-full h-full  flex-col gap-1 md:gap-2">
              <div class="div w-full flex items-center justify-end">
                 <h1 class="text-[clamp(1.2rem,3.2vw,3rem)] font-bold text-end">40%</h1>
              </div>
              <p class="text-[clamp(0.55rem,2.2vw,1rem)] md:text-[clamp(0.55rem,1vw,1rem)]">Decreased in customer phone calls</p>
            </div>
          </div>
    </div>
  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <!-- Lenis -->
  <script src="https://unpkg.com/lenis@1.1.20/dist/lenis.min.js"></script>
  <script src="car-track.js"></script>
  </body>
</html>
